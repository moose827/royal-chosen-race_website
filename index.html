                                            <div className="pl-6 border-l border-gray-100">
                                                <p className="text-xs font-bold text-[#34C759] bg-[#34C759]/10 px-3 py-1 rounded-full mb-4 inline-block">回應詩歌</p>
                                                <div className="space-y-3">{(data.songs.response || []).map((s, i) => <p key={i} className="text-[15px] font-bold text-[#1C1C1E] leading-tight">・{s}</p>)}</div>
                                            </div>
                                        </div>
                                    </div>
                                    <div className={`${cardStyle} p-6`}>
                                        <h3 className="text-xs font-black text-[#8E8E93] uppercase tracking-[0.2em] mb-5">信息大綱 OUTLINE</h3>
                                        <div className="space-y-4">
                                            {(data.sermonOutline || []).map((item, idx) => (
                                                <div key={idx} className="bg-[#F2F2F7] rounded-2xl overflow-hidden border border-gray-100">
                                                    <button onClick={() => setExpandedSermon(expandedSermon === idx ? null : idx)} className="w-full flex justify-between items-center px-5 py-4 text-left active:bg-gray-200 transition-colors">
                                                        <span className="text-[16px] font-bold text-[#1C1C1E] pr-4">{item.title}</span>
                                                        <Icon name="chevronDown" size={18} className={`text-[#AEAEB2] shrink-0 transition-transform ${expandedSermon === idx ? 'rotate-180' : ''}`} />
                                                    </button>
                                                    {expandedSermon === idx && (
                                                        <div className="px-5 pb-5 pt-1 space-y-4">
                                                            {/* ✅ 使用 MultilineText 支援 \n 換行 */}
                                                            {(item.content || []).map((p, pi) => (
                                                                <p key={pi} className="text-[15px] text-[#48484A] leading-relaxed">
                                                                    <MultilineText text={p} />
                                                                </p>
                                                            ))}
                                                        </div>
                                                    )}
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                </div>
                            )}

                            {activeMainTab === 'news' && (
                                <div className="space-y-5">
                                    <div className={`${cardStyle} p-6 space-y-4 border-[#FF9500]/20`}>
                                        <h3 className="text-xs font-black text-[#8E8E93] uppercase tracking-[0.2em] mb-4">教會公告 ANNOUNCEMENTS</h3>
                                        {(data.announcements || []).map((item, idx) => (
                                            <div key={item.id} className="bg-[#FFFDF9] rounded-2xl overflow-hidden border border-[#FF9500]/10">
                                                <button onClick={() => setExpandedNews(expandedNews === idx ? null : idx)} className="w-full flex justify-between items-center px-5 py-4 text-left active:bg-[#FFF7ED] transition-colors">
                                                    <div className="flex items-center gap-3 pr-4">
                                                        <span className="text-[11px] font-bold text-[#FF9500] bg-[#FF9500]/10 px-2.5 py-1 rounded-full uppercase shrink-0">{item.date}</span>
                                                        <span className="text-[16px] font-bold text-[#1C1C1E]">{item.title}</span>
                                                    </div>
                                                    <Icon name="chevronDown" size={18} className={`text-[#AEAEB2] shrink-0 transition-transform ${expandedNews === idx ? 'rotate-180' : ''}`} />
                                                </button>
                                                {expandedNews === idx && (
                                                    <div className="px-5 pb-5 pt-1">
                                                        {/* ✅ 使用 MultilineText 支援公告內的 \n 換行 */}
                                                        <p className="text-[15px] text-[#48484A] leading-relaxed">
                                                            <MultilineText text={item.detail} />
                                                        </p>
                                                    </div>
                                                )}
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}

                            {activeMainTab === 'community' && (
                                <div className="space-y-5">
                                    <div className="bg-white/60 p-1 rounded-2xl flex gap-1 shadow-[inset_0_2px_4px_rgba(0,0,0,0.05)] border border-[#34C759]/10">
                                        {['weekday', 'sunday', 'special'].map(tabId => (
                                            <button key={tabId} onClick={() => setActiveGroupTab(tabId)} className={`flex-1 py-3 text-[14px] font-bold rounded-xl transition-all ${activeGroupTab === tabId ? 'bg-white text-[#34C759] shadow-sm' : 'text-[#8E8E93]'}`}>
                                                {tabId === 'weekday' ? '平日小組' : tabId === 'sunday' ? '主日小組' : '特色/其他'}
                                            </button>
                                        ))}
                                    </div>
                                    <div className={`${cardStyle} border-[#34C759]/20`}>
                                        {(data.groups[activeGroupTab] || []).map((group, idx) => (
                                            <div key={idx} className="px-6 py-5 flex items-center justify-between border-b border-[#34C759]/5 last:border-0 active:bg-gray-50">
                                                <div className="flex-1 pr-4">
                                                    <p className="text-[17px] font-bold text-[#1C1C1E]">{group.name}</p>
                                                    <p className="text-[13px] text-[#6C6C70] font-medium mt-1 leading-tight">{group.time}<br className="sm:hidden" /><span className="hidden sm:inline"> · </span>{group.leader}</p>
                                                </div>
                                                <span className={`text-[12px] font-bold px-3 py-1.5 rounded-xl text-center min-w-[4.5rem] whitespace-nowrap ${group.loc === '馬可樓' ? 'bg-[#34C759]/10 text-[#34C759]' : group.loc === '北科大' ? 'bg-[#007AFF]/10 text-[#007AFF]' : 'bg-[#AEAEB2]/10 text-[#8E8E93]'}`}>
                                                    {group.loc}
                                                </span>
                                            </div>
                                        ))}
                                    </div>
                                    <div className="pt-4">
                                        <h4 className="text-xs font-black text-[#8E8E93] uppercase tracking-[0.2em] mb-4 px-2">海外分會 OVERSEAS</h4>
                                        <div className="space-y-4">
                                            {(data.overseas || []).map((ov, idx) => (
                                                <div key={idx} className={`${cardStyle} border-[#34C759]/20 p-6 flex flex-col gap-4`}>
                                                    <div className="flex items-center gap-4">
                                                        <span className="text-3xl leading-none">{ov.flag}</span>
                                                        <div>
                                                            <p className="text-[17px] font-bold text-[#1C1C1E]">{ov.name}</p>
                                                            <p className="text-[13px] text-[#34C759] font-bold mt-0.5">牧師：{ov.leader}</p>
                                                        </div>
                                                    </div>
                                                    <div className="text-[13px] text-[#6C6C70] font-medium space-y-2 bg-[#F2F9F5] p-3.5 rounded-xl">
                                                        <p className="flex items-center gap-2"><Icon name="clock" size={14} className="text-[#AEAEB2]" /> {ov.time} 聚會</p>
                                                        <p className="flex items-start gap-2"><Icon name="pin" size={14} className="mt-0.5 shrink-0 text-[#AEAEB2]" /> <span className="leading-snug">{ov.loc}</span></p>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                </div>
                            )}
                        </main>

                        <footer className="mt-10 px-5 relative z-10">
                            <div className="flex flex-col gap-5 mb-10">
                                <div className={`${cardStyle} p-7 text-left border-gray-200/40`}>
                                    <div className="flex items-center gap-3 mb-5 text-[#8E8E93]">
                                        <Icon name="card" size={22} />
                                        <h4 className="text-xs font-black uppercase tracking-[0.2em]">奉獻帳戶資訊</h4>
                                    </div>
                                    <div className="space-y-6">
                                        <div className="space-y-1.5">
                                            <p className="text-[11px] font-bold text-[#8E8E93] uppercase tracking-widest">{data.offering.bank}</p>
                                            <p className="text-[28px] font-black text-[#1C1C1E] tracking-tighter block leading-none">{data.offering.account}</p>
                                        </div>
                                        <div className="flex items-start gap-3 p-4 bg-white/60 rounded-2xl border border-gray-100/50">
                                            <Icon name="users" size={18} className="mt-0.5 text-[#007AFF] shrink-0" />
                                            <div className="space-y-1">
                                                <p className="text-[11px] font-bold text-[#8E8E93] uppercase tracking-widest">戶名 ACCOUNT NAME</p>
                                                <p className="text-[15px] font-bold text-[#1C1C1E] leading-snug">{data.offering.name}</p>
                                            </div>
                                        </div>
                                        <p className="text-xs text-[#8E8E93] italic text-center leading-relaxed mt-2">＊透過銀行轉帳奉獻後，請通知辦公室同工＊</p>
                                    </div>
                                </div>
                                <div className={`${cardStyle} p-7 text-left border-gray-200/40`}>
                                    <div className="flex items-center gap-3 mb-5 text-[#8E8E93]">
                                        <Icon name="phone" size={22} />
                                        <h4 className="text-xs font-black uppercase tracking-[0.2em]">聯絡我們 CONTACT</h4>
                                    </div>
                                    <div className="space-y-6">
                                        <div className="space-y-1.5">
                                            <p className="text-[11px] font-bold text-[#8E8E93] uppercase tracking-widest">辦公室電話 PHONE</p>
                                            <a href={`tel:${data.office.phone}`} className="text-[28px] font-black text-[#1C1C1E] tracking-tighter block active:opacity-40 transition-opacity">{data.office.phone}</a>
                                        </div>
                                        <div className="flex items-start gap-3 p-4 bg-white/60 rounded-2xl border border-gray-100/50">
                                            <Icon name="pin" size={18} className="mt-0.5 text-[#007AFF] shrink-0" />
                                            <div className="space-y-1">
                                                <p className="text-[11px] font-bold text-[#8E8E93] uppercase tracking-widest">辦公室地址 ADDRESS</p>
                                                <p className="text-[15px] font-bold text-[#1C1C1E] leading-snug">{data.office.address}</p>
                                            </div>
                                        </div>
                                        <div className="flex justify-between items-center pt-1">
                                            <p className="text-[13px] font-black text-[#007AFF] bg-[#007AFF]/10 px-4 py-2 rounded-full">{data.office.name}</p>
                                            <p className="text-[11px] font-bold text-[#AEAEB2] uppercase tracking-tighter italic font-mono">Church HQ</p>
                                        </div>
                                    </div>
                                </div>
                            </div>
                            <div className="relative z-20 flex flex-wrap justify-center items-center gap-x-6 gap-y-4 mb-10">
                                <a href="https://royal-chosen-race.com/" target="_blank" rel="noopener noreferrer" onClick={(e) => handleExternalLink(e, 'https://royal-chosen-race.com/')} className="flex items-center gap-1.5 text-[14px] font-bold text-[#007AFF] hover:opacity-70 active:opacity-50 transition-opacity cursor-pointer px-2 py-1">
                                    <Icon name="globe" size={16} /> 官方網站
                                </a>
                                <a href="https://reurl.cc/epkgeW" target="_blank" rel="noopener noreferrer" onClick={(e) => handleExternalLink(e, 'https://reurl.cc/epkgeW')} className="flex items-center gap-1.5 text-[14px] font-bold text-[#AF52DE] hover:opacity-70 active:opacity-50 transition-opacity cursor-pointer px-2 py-1">
                                    <Icon name="plus" size={16} /> 新人名單
                                </a>
                                <a href="https://reurl.cc/0mWG5A" target="_blank" rel="noopener noreferrer" onClick={(e) => handleExternalLink(e, 'https://reurl.cc/0mWG5A')} className="flex items-center gap-1.5 text-[14px] font-bold text-[#FF2D55] hover:opacity-70 active:opacity-50 transition-opacity cursor-pointer px-2 py-1">
                                    <Icon name="message" size={16} /> 聚會回饋
                                </a>
                            </div>
                            <div className="space-y-4 opacity-40 text-center">
                                <p className="text-[11px] font-bold text-[#1C1C1E] tracking-[0.3em] uppercase px-4 leading-relaxed">彼此相愛 · 成全聖徒 · 各盡其職 · 完成使命</p>
                                <p className="text-xs text-[#1C1C1E] font-bold tracking-widest">© 2026 中華基督教風一族職場教會</p>
                            </div>
                        </footer>

                        <div className="fixed bottom-6 left-1/2 -translate-x-1/2 w-full max-w-[448px] px-5 z-50">
                            <div className="bg-white/85 backdrop-blur-xl border border-gray-200/60 rounded-full shadow-[0_10px_40px_rgba(0,0,0,0.1)] p-2 flex gap-1 justify-center">
                                {[
                                    { id: 'worship', label: '主日聚會', icon: 'church', activeBg: 'bg-[#007AFF]' },
                                    { id: 'news', label: '教會消息', icon: 'bell', activeBg: 'bg-[#FF9500]' },
                                    { id: 'community', label: '小組資訊', icon: 'users', activeBg: 'bg-[#34C759]' }
                                ].map(item => (
                                    <button key={item.id} onClick={() => setActiveMainTab(item.id)} className={`flex-1 flex flex-col items-center justify-center h-[3.5rem] rounded-[2rem] transition-all duration-300 active:scale-95 ${
                                        activeMainTab === item.id ? `${item.activeBg} text-white shadow-md` : 'text-[#8E8E93] hover:bg-gray-100/50'
                                    }`}>
                                        <Icon name={item.icon} size={20} className="mb-0.5" />
                                        <span className="text-[11px] font-bold tracking-wide">{item.label}</span>
                                    </button>
                                ))}
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
