<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>風一族職場教會手機週報</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.16.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.16.0/firebase-database-compat.js"></script>

    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
        body { font-family: 'Noto Sans TC', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; -webkit-font-smoothing: antialiased; background-color: #D1D1D6; }
        .backdrop-blur { backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); }
        @keyframes pulse-custom { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.7; transform: scale(1.1); } }
        .animate-pulse-custom { animation: pulse-custom 3s ease-in-out infinite; }
        .safe-bottom { padding-bottom: env(safe-area-inset-bottom); }
        /* 這裡保留你原本 index.html 所有的 CSS 樣式 */
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // --- Firebase 配置區 (必須與 admin.html 一致) ---
        const firebaseConfig = {
          apiKey: "AIzaSyCotyhW5mvvDE9YYSz2sICwMtrFlia1Tyg",
          authDomain: "royal-chosen-race.firebaseapp.com",
          projectId: "royal-chosen-race",
          databaseURL: "https://royal-chosen-race-default-rtdb.firebaseio.com",
          storageBucket: "royal-chosen-race.firebasestorage.app",
          messagingSenderId: "505655650913",
          appId: "1:505655650913:web:9ee5735807e21faee15820"
        };

        // 初始化 Firebase
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const db = firebase.database();

        // 原本的圖示組件 (保留不變)
        const Icon = ({ name, size = 24, className = "" }) => {
            const icons = {
                church: <path d="M3 21h18M10 21V10l-2 2m4-2v11m4-11l2 2m-2-2V8a2 2 0 00-2-2H8a2 2 0 00-2 2v2" stroke="currentColor" strokeWidth="2" fill="none" />,
                bell: <path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9M13.73 21a2 2 0 01-3.46 0" stroke="currentColor" strokeWidth="2" fill="none" />,
                users: <path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2M9 7a4 4 0 100-8 4 4 0 000 8zm14 14v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75" stroke="currentColor" strokeWidth="2" fill="none" />
            };
            return <svg width={size} height={size} viewBox="0 0 24 24" className={className}>{icons[name] || null}</svg>;
        };

        const App = () => {
            const [activeMainTab, setActiveMainTab] = useState('worship');
            const [data, setData] = useState(null); // 初始設為 null

            // 【核心功能】：即時監聽雲端資料
            useEffect(() => {
                const bulletinRef = db.ref('bulletin_data');
                // 使用 .on('value', ...) 代表只要雲端有變動，這裡就會自動執行
                bulletinRef.on('value', (snapshot) => {
                    const cloudData = snapshot.val();
                    if (cloudData) {
                        setData(cloudData);
                    }
                });
                
                // 離開網頁時停止監聽
                return () => bulletinRef.off();
            }, []);

            // 如果資料還沒從雲端抓到，顯示載入畫面
            if (!data) {
                return (
                    <div className="flex items-center justify-center min-h-screen bg-gray-100">
                        <div className="text-center">
                            <div className="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-500 mx-auto mb-4"></div>
                            <p className="text-gray-500 font-bold">同步雲端週報中...</p>
                        </div>
                    </div>
                );
            }

            // --- 以下接原本 index.html 的渲染邏輯 (如 renderWorshipContent 等) ---
            // 注意：原本程式碼中定義的 INITIAL_DATA 現在都不會被用到，改用 data 狀態即可

            return (
                <div className="min-h-screen pb-32">
                    {/* ... 保留你原本 index.html 的所有 UI 佈局代碼 ... */}
                </div>
            );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
